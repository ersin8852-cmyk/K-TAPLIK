<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archive Kütüphanesi</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Maps for React & Lucide Icons -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0"
            }
        }
    </script>
    
    <!-- Babel & Barcode Scanner -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        /* Özel kaydırma çubuğu gizleme (daha şık mobil görünüm için) */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-zinc-100 flex justify-center text-zinc-900">
    <div id="root" class="w-full h-full max-w-md bg-white shadow-2xl relative overflow-hidden flex flex-col h-screen"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, createContext, useContext, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Library, List, BarChart3, Plus, Search, ChevronDown, ChevronRight, 
          ArrowUp, ArrowDown, BookOpen, Edit2, Check, X, FolderPlus, FileText, MoveRight,
          Camera, Trash2
        } from 'lucide-react';

        const STORAGE_KEY = 'archive_app_data_v2';
        const generateId = () => Math.random().toString(36).substring(2, 15);

        const initialState = { books: [], folders: [] };
        const ArchiveContext = createContext();
        const useArchive = () => useContext(ArchiveContext);

        const ArchiveProvider = ({ children }) => {
            const [data, setData] = useState(() => {
                try {
                    const localData = localStorage.getItem(STORAGE_KEY);
                    return localData ? JSON.parse(localData) : initialState;
                } catch (e) {
                    return initialState;
                }
            });

            const [toast, setToast] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }, [data]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const confirmAction = (message, onConfirm) => {
                setConfirmDialog({ message, onConfirm });
            };

            // FOLDERS
            const addFolder = (name, parentId = null) => {
                const siblings = data.folders.filter(f => f.parentId === parentId);
                const order = siblings.length > 0 ? Math.max(...siblings.map(s => s.order)) + 1 : 0;
                const newFolder = { id: generateId(), name, parentId, order };
                setData(prev => ({ ...prev, folders: [...prev.folders, newFolder] }));
            };

            const deleteFolder = (id) => {
                setData(prev => {
                    const newFolders = prev.folders.filter(f => f.id !== id).map(f => f.parentId === id ? { ...f, parentId: null } : f);
                    const newBooks = prev.books.map(b => b.folderId === id ? { ...b, folderId: null } : b);
                    return { folders: newFolders, books: newBooks };
                });
                showToast('Klasör silindi. İçindeki kitaplar ana dizine taşındı.');
            };

            const reorderFolder = (id, direction) => {
                setData(prev => {
                    const folder = prev.folders.find(f => f.id === id);
                    if (!folder) return prev;
                    const siblings = prev.folders.filter(f => f.parentId === folder.parentId).sort((a, b) => a.order - b.order);
                    const index = siblings.findIndex(f => f.id === id);
                    
                    if (direction === 'up' && index > 0) {
                        const prevSibling = siblings[index - 1];
                        return { ...prev, folders: prev.folders.map(f => f.id === id ? { ...f, order: prevSibling.order } : f.id === prevSibling.id ? { ...f, order: folder.order } : f) };
                    }
                    if (direction === 'down' && index < siblings.length - 1) {
                        const nextSibling = siblings[index + 1];
                        return { ...prev, folders: prev.folders.map(f => f.id === id ? { ...f, order: nextSibling.order } : f.id === nextSibling.id ? { ...f, order: folder.order } : f) };
                    }
                    return prev;
                });
            };

            // BOOKS
            const addBook = (bookData, folderId = null) => {
                if (bookData.isbn && data.books.some(b => b.isbn === bookData.isbn)) {
                    showToast('Bu kitap veya ISBN zaten arşivinizde mevcut!');
                    return false;
                }
                const siblings = data.books.filter(b => b.folderId === folderId);
                const order = siblings.length > 0 ? Math.max(...siblings.map(s => s.order)) + 1 : 0;
                const newBook = { ...bookData, id: generateId(), folderId, order, inLibrary: false, isRead: false };
                
                setData(prev => ({ ...prev, books: [...prev.books, newBook] }));
                showToast('Kitap eklendi.');
                return true;
            };

            const updateBook = (id, updates) => {
                setData(prev => ({ ...prev, books: prev.books.map(b => b.id === id ? { ...b, ...updates } : b) }));
            };

            const deleteBook = (id) => {
                setData(prev => ({ ...prev, books: prev.books.filter(b => b.id !== id) }));
                showToast('Kitap silindi.');
            };

            const moveBook = (bookId, newFolderId) => {
                setData(prev => {
                    const siblings = prev.books.filter(b => b.folderId === newFolderId);
                    const newOrder = siblings.length > 0 ? Math.max(...siblings.map(s => s.order)) + 1 : 0;
                    return { ...prev, books: prev.books.map(b => b.id === bookId ? { ...b, folderId: newFolderId, order: newOrder } : b) };
                });
                showToast('Kitap taşındı.');
            };

            const reorderBook = (id, direction) => {
                setData(prev => {
                    const book = prev.books.find(b => b.id === id);
                    if (!book) return prev;
                    const siblings = prev.books.filter(b => b.folderId === book.folderId).sort((a, b) => a.order - b.order);
                    const index = siblings.findIndex(b => b.id === id);
                    
                    if (direction === 'up' && index > 0) {
                        const prevSibling = siblings[index - 1];
                        return { ...prev, books: prev.books.map(b => b.id === id ? { ...b, order: prevSibling.order } : b.id === prevSibling.id ? { ...b, order: book.order } : b) };
                    }
                    if (direction === 'down' && index < siblings.length - 1) {
                        const nextSibling = siblings[index + 1];
                        return { ...prev, books: prev.books.map(b => b.id === id ? { ...b, order: nextSibling.order } : b.id === nextSibling.id ? { ...b, order: book.order } : b) };
                    }
                    return prev;
                });
            };

            return (
                <ArchiveContext.Provider value={{
                    books: data.books, folders: data.folders,
                    addFolder, deleteFolder, reorderFolder,
                    addBook, updateBook, deleteBook, moveBook, reorderBook,
                    toast, confirmAction
                }}>
                    {children}
                    
                    {toast && (
                        <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-zinc-900 text-white px-5 py-2.5 rounded-full shadow-xl z-50 text-sm font-medium animate-in fade-in">
                            {toast}
                        </div>
                    )}

                    {confirmDialog && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[70]">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl">
                                <h3 className="text-lg font-bold text-zinc-900 mb-2">Emin misiniz?</h3>
                                <p className="text-sm text-zinc-600 mb-6 leading-relaxed">{confirmDialog.message}</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 py-2.5 rounded-xl bg-zinc-100 text-zinc-700 font-medium hover:bg-zinc-200">İptal</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="flex-1 py-2.5 rounded-xl bg-red-600 text-white font-medium hover:bg-red-700">Evet, Sil</button>
                                </div>
                            </div>
                        </div>
                    )}
                </ArchiveContext.Provider>
            );
        };

        const BarcodeScanner = ({ onResult, onClose }) => {
            useEffect(() => {
                const scanner = new window.Html5Qrcode("reader");
                const config = { fps: 10, qrbox: { width: 250, height: 150 } };
                
                scanner.start(
                    { facingMode: "environment" }, 
                    config,
                    (decodedText) => {
                        scanner.stop();
                        onResult(decodedText);
                    },
                    (err) => { /* ignore normal scanning errors */ }
                ).catch(err => {
                    console.error("Kamera başlatılamadı:", err);
                    alert("Kameraya erişilemedi. Lütfen tarayıcı izinlerini kontrol edin.");
                    onClose();
                });

                return () => {
                    if (scanner.isScanning) {
                        scanner.stop().catch(console.error);
                    }
                };
            }, [onResult, onClose]);

            return (
                <div className="fixed inset-0 bg-black z-[60] flex flex-col">
                    <div className="p-4 flex justify-between items-center bg-zinc-900 text-white pt-8">
                        <h3 className="font-semibold text-lg">Barkod Okut (ISBN)</h3>
                        <button onClick={onClose} className="p-2 bg-zinc-800 rounded-full hover:bg-zinc-700"><X size={20} /></button>
                    </div>
                    <div className="flex-1 flex items-center justify-center bg-black relative">
                        <div id="reader" className="w-full"></div>
                    </div>
                    <div className="p-6 bg-zinc-900 text-zinc-400 text-center text-sm">
                        Kitabın arkasındaki ISBN barkodunu ekrandaki kareye sığdırın. Sistem otomatik algılayacaktır.
                    </div>
                </div>
            );
        };

        const SearchAddModal = ({ isOpen, onClose, folderId }) => {
            const { addBook } = useArchive();
            const [query, setQuery] = useState('');
            const [publisherFilter, setPublisherFilter] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchError, setSearchError] = useState(null);
            const [showCamera, setShowCamera] = useState(false);

            if (!isOpen) return null;

            const performSearch = async (overrideQuery = null) => {
                const searchQuery = (overrideQuery || query).trim();
                if (!searchQuery) return;
                
                setLoading(true);
                setResults([]);
                setSearchError(null);

                const cleanQuery = searchQuery.replace(/[- ]/g, '');
                const isIsbn = /^\d+$/.test(cleanQuery) && cleanQuery.length >= 10;

                try {
                    // Eşzamanlı Agresif Arama: İki devasa sisteme aynı anda sor
                    const [gbResponse, olResponse] = await Promise.allSettled([
                        fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(searchQuery)}&maxResults=10`),
                        isIsbn 
                            ? fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${cleanQuery}&format=json&jscmd=data`)
                            : fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(searchQuery)}&limit=10`)
                    ]);

                    let googleBooks = [];
                    let openLibraryBooks = [];

                    if (gbResponse.status === 'fulfilled' && gbResponse.value.ok) {
                        const gbData = await gbResponse.value.json();
                        if (gbData.items) {
                            googleBooks = gbData.items.map(item => {
                                const vol = item.volumeInfo;
                                const isbnObj = vol.industryIdentifiers?.find(i => i.type.includes('ISBN'));
                                return {
                                    isbn: isbnObj ? isbnObj.identifier : (isIsbn ? cleanQuery : ''),
                                    title: vol.title || 'Başlık Yok',
                                    author: vol.authors ? vol.authors.join(', ') : 'Yazar Belirtilmemiş',
                                    publisher: vol.publisher || 'Yayınevi Belirtilmemiş',
                                    pageCount: vol.pageCount || 0,
                                    year: vol.publishedDate ? vol.publishedDate.substring(0, 4) : '',
                                    price: ''
                                };
                            });
                        }
                    }

                    if (olResponse.status === 'fulfilled' && olResponse.value.ok) {
                        const olData = await olResponse.value.json();
                        if (isIsbn && olData[`ISBN:${cleanQuery}`]) {
                            const book = olData[`ISBN:${cleanQuery}`];
                            openLibraryBooks.push({
                                isbn: cleanQuery,
                                title: book.title || 'Başlık Yok',
                                author: book.authors ? book.authors.map(a => a.name).join(', ') : 'Yazar Belirtilmemiş',
                                publisher: book.publishers ? book.publishers.map(p => p.name).join(', ') : 'Yayınevi Belirtilmemiş',
                                pageCount: book.number_of_pages || 0,
                                year: book.publish_date || '',
                                price: ''
                            });
                        } else if (!isIsbn && olData.docs) {
                            openLibraryBooks = olData.docs.slice(0,10).map(doc => ({
                                isbn: doc.isbn ? doc.isbn[0] : '',
                                title: doc.title || 'Başlık Yok',
                                author: doc.author_name ? doc.author_name.join(', ') : 'Yazar Belirtilmemiş',
                                publisher: doc.publisher ? doc.publisher[0] : 'Yayınevi Belirtilmemiş',
                                pageCount: doc.number_of_pages_median || 0,
                                year: doc.first_publish_year || '',
                                price: ''
                            }));
                        }
                    }

                    // Verileri Harmanla (Merge)
                    const allBooks = [...googleBooks, ...openLibraryBooks];
                    const uniqueBooks = [];

                    allBooks.forEach(book => {
                        const existing = uniqueBooks.find(b => 
                            (book.isbn && b.isbn === book.isbn) || (b.title.toLowerCase() === book.title.toLowerCase())
                        );
                        if (existing) {
                            if (existing.publisher === 'Yayınevi Belirtilmemiş' && book.publisher !== 'Yayınevi Belirtilmemiş') existing.publisher = book.publisher;
                            if (existing.pageCount === 0 && book.pageCount > 0) existing.pageCount = book.pageCount;
                            if (existing.author === 'Yazar Belirtilmemiş' && book.author !== 'Yazar Belirtilmemiş') existing.author = book.author;
                            if (existing.year === '' && book.year !== '') existing.year = book.year;
                        } else {
                            uniqueBooks.push(book);
                        }
                    });

                    let finalBooks = uniqueBooks;
                    if (publisherFilter) {
                        finalBooks = finalBooks.filter(b => b.publisher.toLowerCase().includes(publisherFilter.toLowerCase()));
                    }

                    if (finalBooks.length === 0) {
                        setSearchError("Bu aramaya uygun kitap bulunamadı. Lütfen kelimeleri değiştirin veya barkod okutun.");
                    }
                    setResults(finalBooks);

                } catch (error) { 
                    console.error("API Hatası:", error); 
                    setSearchError("Arama sırasında bir bağlantı sorunu oluştu.");
                }

                setLoading(false);
            };

            const handleCameraScan = (barcode) => {
                setShowCamera(false);
                setQuery(barcode);
                performSearch(barcode);
            };

            return (
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center sm:p-4 z-50">
                    <div className="bg-white rounded-t-3xl sm:rounded-2xl w-full max-w-lg h-[90vh] sm:h-auto sm:max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-in slide-in-from-bottom-5">
                        <div className="p-4 border-b flex justify-between items-center bg-zinc-50 pt-6 sm:pt-4">
                            <h2 className="text-lg font-bold text-zinc-800">Yeni Kitap Ekle</h2>
                            <button onClick={onClose} className="p-1.5 bg-zinc-200 hover:bg-zinc-300 rounded-full transition-colors"><X size={18} /></button>
                        </div>
                        
                        <div className="p-4 flex flex-col gap-3">
                            <div className="flex gap-2">
                                <button 
                                    onClick={() => setShowCamera(true)}
                                    className="px-3 py-2 bg-zinc-100 text-zinc-700 rounded-xl hover:bg-zinc-200 transition-colors flex items-center justify-center border border-zinc-200"
                                    title="Barkod Tara"
                                >
                                    <Camera size={20} />
                                </button>
                                <div className="relative flex-1">
                                    <Search className="absolute left-3 top-3 text-zinc-400" size={18} />
                                    <input 
                                        type="text" 
                                        placeholder="Kitap Adı veya ISBN..." 
                                        className="w-full pl-9 pr-4 py-2.5 border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-zinc-800 bg-zinc-50 font-medium"
                                        value={query}
                                        onChange={e => setQuery(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && !loading && performSearch()}
                                    />
                                </div>
                                <button 
                                    onClick={() => performSearch()}
                                    disabled={loading}
                                    className={`px-5 py-2 text-white rounded-xl font-semibold transition-colors ${loading ? 'bg-zinc-400' : 'bg-zinc-900 hover:bg-zinc-800'}`}
                                >
                                    Bul
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 bg-zinc-50/50">
                            {loading ? (
                                <div className="text-center py-10 flex flex-col items-center">
                                    <div className="w-8 h-8 border-4 border-zinc-300 border-t-zinc-900 rounded-full animate-spin mb-3"></div>
                                    <span className="text-zinc-500 font-medium">Bütün kütüphaneler taranıyor...</span>
                                </div>
                            ) : searchError ? (
                                <div className="text-center py-8 px-4 text-red-500 text-sm font-medium bg-red-50 rounded-xl">
                                    {searchError}
                                </div>
                            ) : results.length > 0 ? (
                                <div className="flex flex-col gap-3 pb-10">
                                    {results.map((book, idx) => (
                                        <div key={idx} className="bg-white p-4 rounded-xl border border-zinc-100 shadow-sm flex items-center justify-between">
                                            <div className="flex-1 pr-3">
                                                <h3 className="font-bold text-zinc-900 text-sm leading-tight">{book.title}</h3>
                                                <p className="text-xs text-zinc-500 mt-1">{book.author} • <span className="font-medium text-zinc-700">{book.publisher}</span></p>
                                                {book.pageCount > 0 && <span className="text-[10px] text-zinc-400 bg-zinc-100 px-2 py-0.5 rounded-full mt-1.5 inline-block">{book.pageCount} Sayfa</span>}
                                            </div>
                                            <button 
                                                onClick={() => { if(addBook(book, folderId)) onClose(); }}
                                                className="p-2 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-xl transition-colors font-medium flex items-center gap-1"
                                            >
                                                <Plus size={18} /> Ekle
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-12 text-zinc-400 text-sm flex flex-col items-center">
                                    <Search size={40} className="opacity-20 mb-3" />
                                    <span>Arama yapmak için kitap adı, yazar <br/> veya ISBN barkod numarası girin.</span>
                                </div>
                            )}
                        </div>
                    </div>
                    {showCamera && <BarcodeScanner onResult={handleCameraScan} onClose={() => setShowCamera(false)} />}
                </div>
            );
        };

        const BookDetailModal = ({ bookId, isOpen, onClose }) => {
            const { books, updateBook, folders, deleteBook, confirmAction } = useArchive();
            const book = books.find(b => b.id === bookId);
            const [isEditing
