<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Archive Kütüphanesi</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff" media="(max-width: 639px)">
    <meta name="theme-color" content="#18181b" media="(min-width: 640px)">
    <link rel="apple-touch-icon" href="./icon.png?v=2">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css">

    <style>
        /* Animasyonlu Açılış Ekranı Tasarımı */
        #custom-splash {
            position: fixed;
            inset: 0;
            background-color: #ffffff;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
            font-family: 'Courier New', Courier, monospace;
        }

        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        #splash-title {
            color: #18181b;
            font-weight: 800;
            font-size: 2.8rem;
            letter-spacing: 0.4rem;
            min-height: 3.5rem;
        }

        #splash-subtitle {
            color: #52525b;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1rem;
            min-height: 1.5rem;
        }

        /* Yanıp sönen siyah daktilo imleci */
        .cursor::after {
            content: '|';
            color: #18181b; /* İmleç rengi siyah yapıldı */
            animation: blink 0.8s step-end infinite;
            margin-left: 4px;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Kaybolma efekti */
        .fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body class="bg-white sm:bg-zinc-100 flex justify-center text-zinc-900 overflow-x-hidden">
    
    <!-- Özel Açılış Ekranı -->
    <div id="custom-splash">
        <div class="splash-content">
            <div id="splash-title"></div>
            <div id="splash-subtitle"></div>
        </div>
    </div>

    <div id="root" class="w-full h-full sm:max-w-md bg-white sm:shadow-2xl relative overflow-hidden flex flex-col h-[100dvh]"></div>

    <!-- Daktilo Animasyonu Mantığı -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('custom-splash');
            const titleEl = document.getElementById('splash-title');
            const subtitleEl = document.getElementById('splash-subtitle');

            const titleText = "Archive";
            const subtitleText = "Kütüphanen artık cebinde...";

            // İnsan hızıyla rastgele yazma fonksiyonu
            const typeText = async (element, text, minSpeed, maxSpeed) => {
                element.classList.add('cursor');
                for (let i = 0; i < text.length; i++) {
                    element.innerHTML = text.substring(0, i + 1);
                    // Belirlenen aralıkta rastgele bir gecikme (insan hızı efekti)
                    const delay = Math.random() * (maxSpeed - minSpeed) + minSpeed;
                    await new Promise(r => setTimeout(r, delay));
                }
            };

            const runAnimation = async () => {
                // 0. PWA kendi ikonunu gösterirken animasyonun kaçmamasını sağlamak için tam 1 saniye (1000ms) bekle
                await new Promise(r => setTimeout(r, 1350));

                // 1. "Archive" yazısını biraz tok ve vurgulu yaz (100ms - 250ms arası)
                await typeText(titleEl, titleText, 100, 250);

                // 2. Yazı bittikten sonra imleç 1.2 saniye boyunca boşta yanıp sönsün
                await new Promise(r => setTimeout(r, 1200));

                // 3. Üstteki imleci kaldır, alt satıra geç
                titleEl.classList.remove('cursor');
                
                // 4. Alt yazıyı biraz daha seri bir şekilde yaz (40ms - 100ms arası)
                await typeText(subtitleEl, subtitleText, 40, 100);

                // 5. Yazı bittikten sonra okunması için yarım saniye bekle
                await new Promise(r => setTimeout(r, 600));

                // 6. Ekranı hızlı ve yumuşak bir şekilde erit (fade-out)
                splash.classList.add('fade-out');

                // 7. Animasyon bittikten sonra arka planda boşuna yer kaplamasın diye sil
                setTimeout(() => splash.remove(), 500);
            };

            runAnimation();
        });
    </script>

    <!-- Uygulama Başlatıcı (Bootstrap) -->
    <script>
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const existing = document.querySelector(`script[data-src="${src}"]`);
                if (existing) { resolve(); return; }
                const s = document.createElement('script');
                s.src = src;
                s.dataset.src = src;
                s.onload = () => resolve();
                s.onerror = () => reject(new Error(src));
                document.head.appendChild(s);
            });
        }

        function showFatalError(failedUrl) {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div style="height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; font-family:sans-serif; gap:10px;">
                    <div style="font-size:32px;">⚠️</div>
                    <h2 style="margin:0; color:#18181b; font-size:16px;">Uygulama yüklenemedi</h2>
                    <p style="margin:0; color:#71717a; font-size:13px; max-width:320px;">
                        Gerekli bir kütüphane veya modül yüklenemedi:<br/>
                        <code style="font-size:11px; word-break:break-all;">${failedUrl}</code>
                    </p>
                    <p style="margin:0; color:#a1a1aa; font-size:12px; max-width:320px;">
                        Lütfen Vercel üzerinden çalıştırdığınıza emin olun. İnternet bağlantınızı kontrol edin.
                    </p>
                    <button onclick="window.location.reload()" style="margin-top:8px; padding:8px 16px; background:#18181b; color:white; border:none; border-radius:10px; font-size:13px; cursor:pointer;">
                        Sayfayı Yenile
                    </button>
                </div>`;
        }

        async function bootstrap() {
            try {
                await loadScript('https://unpkg.com/react@18.2.0/umd/react.production.min.js');
                if (!window.React) throw new Error('React yüklendi ama window.React oluşmadı');

                await loadScript('https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js');
                if (!window.ReactDOM) throw new Error('ReactDOM yüklendi ama window.ReactDOM oluşmadı');

                window.react = window.React;

                await loadScript('https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js');
                if (!window.LucideReact) throw new Error('lucide-react yüklendi ama window.LucideReact oluşmadı');

                await loadScript('https://unpkg.com/html5-qrcode');
                if (!window.Html5Qrcode) throw new Error('html5-qrcode yüklendi ama window.Html5Qrcode oluşmadı');

                await loadScript('https://unpkg.com/@babel/standalone/babel.min.js');
                if (!window.Babel) throw new Error('Babel yüklendi ama window.Babel oluşmadı');

                const files = [
                    './context.js',
                    './SearchModal.js',
                    './BookDetail.js',
                    './Views.js',
                    './main.js'
                ];

                let fullSource = '';
                for (const file of files) {
                    const response = await fetch(file);
                    if (!response.ok) throw new Error(`${file} dosyası çekilemedi`);
                    fullSource += await response.text() + '\n\n';
                }

                const compiled = window.Babel.transform(fullSource, {
                    presets: [['react', { runtime: 'classic' }]]
                }).code;

                const runner = document.createElement('script');
                runner.textContent = compiled;
                document.body.appendChild(runner);
            } catch (err) {
                console.error('Başlatma hatası:', err);
                showFatalError(err.message);
            }
        }

        bootstrap();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('Service Worker kayıtlı:', reg.scope))
            .catch(err => console.log('Service Worker hata:', err));
        });
      }
    </script>
</body>
</html>
