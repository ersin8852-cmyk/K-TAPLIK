<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ARCHIVE_ System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@300;400;600&display=swap');
        :root { --bg: #050505; --accent: #c9a96e; --text: #e0e0e0; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        nav { display: flex; gap: 30px; padding: 20px 40px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: #666; cursor: pointer; font-family: 'Space Mono', monospace; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent); }
        .view { display: none; padding: 40px; }
        .view.active { display: block; }
        .card { background: rgba(20,20,20,0.8); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .action-btn { background: var(--accent); border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button class="tab-btn active" onclick="show('listelerim')">Listelerim</button>
    <button class="tab-btn" onclick="show('kutuphanem')">Kütüphanem</button>
    <button class="tab-btn" onclick="show('verilerim')">Verilerim</button>
</nav>

<div id="listelerim" class="view active">
    <button class="action-btn" onclick="addFolder()">+ KLASÖR</button>
    <button class="action-btn" onclick="addBook()">+ KİTAP</button>
    <div id="listContainer" style="margin-top:20px;"></div>
</div>

<div id="kutuphanem" class="view">
    <div id="libContainer"></div>
</div>

<div id="verilerim" class="view">
    <div id="statsContainer" class="card"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('archiveDB')) || { books: [], folders: [] };

    function sync() { localStorage.setItem('archiveDB', JSON.stringify(db)); render(); }

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'verilerim') calcStats();
    }

    function addFolder() {
        let name = prompt("Klasör Adı:");
        if(name) { db.folders.push({id: Date.now(), name}); sync(); }
    }

    function addBook() {
        let title = prompt("Kitap Adı:");
        if(title) { db.books.push({id: Date.now(), title, status: 'list'}); sync(); }
    }

    function toggleLib(id) {
        let b = db.books.find(x => x.id == id);
        b.status = (b.status === 'list') ? 'lib' : 'list';
        sync();
    }

    function calcStats() {
        let container = document.getElementById('statsContainer');
        container.innerHTML = `<h3>İstatistikler</h3>
            <p>Toplam Kitap: ${db.books.length}</p>
            <p>Kütüphanemdeki: ${db.books.filter(x=>x.status=='lib').length}</p>`;
    }

    function render() {
        // Listelerim
        document.getElementById('listContainer').innerHTML = db.books.map(b => 
            `<div class="card" style="border-left: 3px solid ${b.status=='lib'?'var(--accent)':'transparent'}">
                ${b.title} 
                <button onclick="toggleLib(${b.id})">${b.status=='lib'?'Kütüphaneden Çıkar':'Kütüphaneye Ekle'}</button>
            </div>`).join('');

        // Kütüphanem
        document.getElementById('libContainer').innerHTML = db.books.filter(x => x.status == 'lib').map(b => 
            `<div class="card">${b.title}</div>`).join('');
    }

    render();
</script>
</body>
</html>
