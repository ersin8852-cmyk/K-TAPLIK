<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Archive v1.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg: #050505;
            --surface: rgba(20, 20, 20, 0.8);
            --accent: #c9a96e;
            --text: #e0e0e0;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* FUTURISTIK NAV */
        nav {
            display: flex;
            gap: 20px;
            padding: 20px 40px;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .brand { font-family: 'Space Mono', monospace; font-size: 1.5rem; color: var(--accent); margin-right: 40px; letter-spacing: -1px; }

        .tab-btn {
            background: none; border: none; color: #666; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 0.8rem;
            transition: all 0.3s ease; text-transform: uppercase;
        }
        .tab-btn.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        /* VIEW CONTAINER */
        .view { display: none; padding: 40px; height: calc(100vh - 100px); overflow-y: auto; }
        .view.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* INTERAKTIF KARTLAR */
        .glass {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<nav>
    <div class="brand">ARCHIVE_</div>
    <button class="tab-btn active" onclick="switchTab('listelerim')">Listelerim</button>
    <button class="tab-btn" onclick="switchTab('kutuphanem')">Kütüphanem</button>
    <button class="tab-btn" onclick="switchTab('verilerim')">Verilerim</button>
</nav>

<div id="listelerim" class="view active">
    <div class="glass">
        <h2>SİSTEM BAŞLATILDI</h2>
        <p>Klasör hiyerarşisi yükleniyor...</p>
    </div>
</div>

<div id="kutuphanem" class="view">
    <div class="glass"><h2>KÜTÜPHANE AYNASI</h2></div>
</div>

<div id="verilerim" class="view">
    <div class="glass"><h2>DATA ANALİZ</h2></div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
