<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVE_ OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg: #030303; --surface: rgba(20, 20, 22, 0.7); --surface-hover: rgba(30, 30, 35, 0.9);
            --accent: #d4af37; --accent-dim: rgba(212, 175, 55, 0.2);
            --text: #e8e8e8; --text-muted: #888;
            --border: rgba(255, 255, 255, 0.08); --danger: #ff4a4a; --success: #4aff8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* NAVBAR */
        nav { display: flex; gap: 30px; padding: 20px 40px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; align-items: center; }
        .brand { font-family: 'Space Mono', monospace; font-size: 1.4rem; color: var(--accent); font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px var(--accent-dim); }
        .tab-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-family: 'Space Mono', monospace; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; padding: 5px 0; }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* VIEWS */
        .view { display: none; padding: 40px; flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* COMPONENTS */
        .glass { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; backdrop-filter: blur(10px); padding: 20px; }
        .btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.8rem; transition: 0.2s; }
        .btn:hover { background: var(--surface-hover); border-color: var(--accent); }
        .btn-accent { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
        .btn-accent:hover { background: var(--accent); color: var(--bg); }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; font-family: 'Inter', sans-serif; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--accent); }

        /* HIERARCHY TREE */
        .folder-group { margin-left: 20px; border-left: 1px dashed var(--border); padding-left: 15px; margin-top: 10px; }
        .item-card { background: rgba(10, 10, 10, 0.6); border: 1px solid var(--border); border-radius: 8px; padding: 12px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .item-card:hover { border-color: rgba(255,255,255,0.2); background: rgba(20,20,20,0.8); }
        .item-title { font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .item-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
        .item-actions { display: flex; gap: 8px; }
        
        .in-lib-highlight { border-left: 3px solid var(--accent); }
        .is-read-highlight { border-left: 3px solid var(--success); }

        /* SEARCH */
        .search-bar { display: flex; gap: 10px; margin-bottom: 30px; }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; border-top: 3px solid var(--accent); }
        .stat-val { font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: bold; color: var(--text); margin: 10px 0; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 200; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 500px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .modal-header { font-family: 'Space Mono', monospace; font-size: 1.2rem; margin-bottom: 20px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    </style>
</head>
<body>

<nav>
    <div class="brand">ARCHIVE_</div>
    <button class="tab-btn active" onclick="switchTab('listelerim')">Listelerim</button>
    <button class="tab-btn" onclick="switchTab('kutuphanem')">Kütüphanem</button>
    <button class="tab-btn" onclick="switchTab('verilerim')">Verilerim</button>
</nav>

<!-- LİSTELERİM -->
<div id="listelerim" class="view active">
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Arşivde kitap veya yayınevi ara..." onkeyup="renderArchive()">
        <button class="btn btn-accent" onclick="openFolderModal(null)">+ ANA KLASÖR</button>
        <button class="btn btn-accent" onclick="openBookModal(null, null)">+ ANA KİTAP</button>
    </div>
    <div id="archiveTree"></div>
</div>

<!-- KÜTÜPHANEM -->
<div id="kutuphanem" class="view">
    <div style="margin-bottom: 20px;">
        <h2 style="font-family:'Space Mono'; color:var(--accent);">KÜTÜPHANE AYNASI</h2>
        <p style="color:var(--text-muted); font-size:0.85rem;">Sadece kütüphanene eklediğin kitaplar, orijinal klasör yapılarıyla burada görünür.</p>
    </div>
    <div id="libraryTree"></div>
</div>

<!-- VERİLERİM -->
<div id="verilerim" class="view">
    <h2 style="font-family:'Space Mono'; color:var(--text); margin-bottom: 20px;">LİSTEM İSTATİSTİKLERİ</h2>
    <div class="stats-grid" id="statsList"></div>

    <h2 style="font-family:'Space Mono'; color:var(--accent); margin-bottom: 20px;">KÜTÜPHANEM İSTATİSTİKLERİ</h2>
    <div class="stats-grid" id="statsLib"></div>
</div>

<!-- KİTAP MODAL -->
<div id="bookModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header" id="bookModalTitle">KİTAP VERİSİ</div>
        <input type="hidden" id="bId">
        <input type="hidden" id="bParentId">
        <input type="text" id="bTitle" placeholder="Kitap Adı">
        <input type="text" id="bAuthor" placeholder="Yazar">
        <input type="text" id="bPublisher" placeholder="Yayınevi">
        <div style="display:flex; gap:15px;">
            <input type="number" id="bPages" placeholder="Sayfa Sayısı">
            <input type="number" id="bYear" placeholder="Basım Yılı">
            <input type="number" id="bPrice" placeholder="Fiyat (₺)">
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
            <button class="btn" onclick="closeModals()">İPTAL</button>
            <button class="btn btn-accent" onclick="saveBook()">KAYDET</button>
        </div>
    </div>
</div>

<!-- KLASÖR MODAL -->
<div id="folderModal" class="modal-overlay">
    <div class="modal" style="max-width: 400px;">
        <div class="modal-header">KLASÖR OLUŞTUR / DÜZENLE</div>
        <input type="hidden" id="fId">
        <input type="hidden" id="fParentId">
        <input type="text" id="fName" placeholder="Klasör Adı">
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
            <button class="btn" onclick="closeModals()">İPTAL</button>
            <button class="btn btn-accent" onclick="saveFolder()">KAYDET</button>
        </div>
    </div>
</div>

<script>
    // --- VERİTABANI (STATE) ---
    // Her öğe tek bir dizinde tutulur. Hiyerarşi "parentId" ile sağlanır.
    let items = JSON.parse(localStorage.getItem('archiveProDB')) || [];

    function saveDB() {
        localStorage.setItem('archiveProDB', JSON.stringify(items));
        renderArchive();
        if(document.getElementById('verilerim').classList.contains('active')) renderStats();
    }

    // --- SEKME YÖNETİMİ ---
    function switchTab(tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if (tabId === 'listelerim' || tabId === 'kutuphanem') renderArchive();
        if (tabId === 'verilerim') renderStats();
    }

    // --- MODAL İŞLEMLERİ ---
    function closeModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
    }

    function openFolderModal(parentId, editId = null) {
        document.getElementById('fParentId').value = parentId || '';
        document.getElementById('fId').value = editId || '';
        if (editId) {
            let folder = items.find(i => i.id == editId);
            document.getElementById('fName').value = folder.name;
        } else {
            document.getElementById('fName').value = '';
        }
        document.getElementById('folderModal').style.display = 'flex';
    }

    function saveFolder() {
        const id = document.getElementById('fId').value;
        const parentId = document.getElementById('fParentId').value || null;
        const name = document.getElementById('fName').value.trim();
        if (!name) return;

        if (id) {
            let f = items.find(i => i.id == id);
            f.name = name;
        } else {
            items.push({ id: Date.now().toString(), type: 'folder', name, parentId });
        }
        closeModals(); saveDB();
    }

    function openBookModal(parentId, editId = null) {
        document.getElementById('bParentId').value = parentId || '';
        document.getElementById('bId').value = editId || '';
        if (editId) {
            let book = items.find(i => i.id == editId);
            document.getElementById('bTitle').value = book.title || '';
            document.getElementById('bAuthor').value = book.author || '';
            document.getElementById('bPublisher').value = book.publisher || '';
            document.getElementById('bPages').value = book.pages || '';
            document.getElementById('bYear').value = book.year || '';
            document.getElementById('bPrice').value = book.price || '';
            document.getElementById('bookModalTitle').innerText = 'KİTABI DÜZENLE';
        } else {
            document.getElementById('bTitle').value = '';
            document.getElementById('bAuthor').value = '';
            document.getElementById('bPublisher').value = '';
            document.getElementById('bPages').value = '';
            document.getElementById('bYear').value = '';
            document.getElementById('bPrice').value = '';
            document.getElementById('bookModalTitle').innerText = 'YENİ KİTAP';
        }
        document.getElementById('bookModal').style.display = 'flex';
    }

    function saveBook() {
        const id = document.getElementById('bId').value;
        const parentId = document.getElementById('bParentId').value || null;
        const title = document.getElementById('bTitle').value.trim();
        if (!title) return;

        const bookData = {
            title,
            author: document.getElementById('bAuthor').value,
            publisher: document.getElementById('bPublisher').value,
            pages: parseInt(document.getElementById('bPages').value) || 0,
            year: document.getElementById('bYear').value,
            price: parseFloat(document.getElementById('bPrice').value) || 0
        };

        if (id) {
            let b = items.find(i => i.id == id);
            Object.assign(b, bookData);
        } else {
            items.push({ 
                id: Date.now().toString(), type: 'book', parentId, 
                inLibrary: false, isRead: false, ...bookData 
            });
        }
        closeModals(); saveDB();
    }

    function toggleLibrary(id) {
        let b = items.find(i => i.id == id);
        b.inLibrary = !b.inLibrary;
        saveDB();
    }

    function toggleRead(id) {
        let b = items.find(i => i.id == id);
        b.isRead = !b.isRead;
        saveDB();
    }

    function deleteItem(id) {
        if(confirm("Silmek istediğine emin misin? (Klasörse içindekiler de silinir!)")) {
            // Recursive silme (klasörse çocukları da bul)
            let idsToDelete = [id];
            function findChildren(parentId) {
                items.filter(i => i.parentId == parentId).forEach(child => {
                    idsToDelete.push(child.id);
                    if(child.type === 'folder') findChildren(child.id);
                });
            }
            findChildren(id);
            items = items.filter(i => !idsToDelete.includes(i.id));
            saveDB();
        }
    }

    // --- AĞAÇ (TREE) RENDER MOTORU ---
    
    // Kütüphane görünümü için klasörün içinde kütüphaneye eklenmiş kitap var mı (derin arama)
    function hasLibraryBookInside(folderId) {
        const children = items.filter(i => i.parentId == folderId);
        for (let c of children) {
            if (c.type === 'book' && c.inLibrary) return true;
            if (c.type === 'folder' && hasLibraryBookInside(c.id)) return true;
        }
        return false;
    }

    function buildTreeHTML(parentId, isLibView) {
        let children = items.filter(i => i.parentId == parentId);
        const searchQ = document.getElementById('searchInput').value.toLowerCase();
        
        let html = '';
        children.forEach(item => {
            if (item.type === 'folder') {
                // Kütüphane modundaysak ve içinde kütüphane kitabı yoksa klasörü gösterme
                if (isLibView && !hasLibraryBookInside(item.id)) return;
                
                html += `
                <div class="item-card" style="background: rgba(30,30,30,0.8); border-color: #555;">
                    <div class="item-title" onclick="openFolderModal('${item.parentId}', '${item.id}')">📁 ${item.name}</div>
                    <div class="item-actions">
                        ${!isLibView ? `<button class="btn" onclick="openFolderModal('${item.id}')">+ Klasör</button>
                                        <button class="btn" onclick="openBookModal('${item.id}')">+ Kitap</button>` : ''}
                        ${!isLibView ? `<button class="btn" style="color:var(--danger);" onclick="deleteItem('${item.id}')">Sil</button>` : ''}
                    </div>
                </div>
                <div class="folder-group">
                    ${buildTreeHTML(item.id, isLibView)}
                </div>`;
            } else {
                // Kitap Render
                if (isLibView && !item.inLibrary) return;
                
                // Arama filtresi (sadece Listelerim'de arama inputu var)
                if (!isLibView && searchQ) {
                    const txt = `${item.title} ${item.author} ${item.publisher}`.toLowerCase();
                    if (!txt.includes(searchQ)) return;
                }

                let borderClass = '';
                if(item.inLibrary && !isLibView) borderClass = 'in-lib-highlight';
                if(item.isRead && isLibView) borderClass = 'is-read-highlight';

                html += `
                <div class="item-card ${borderClass}">
                    <div style="flex:1;">
                        <div class="item-title" onclick="openBookModal('${item.parentId}', '${item.id}')">
                            📄 ${item.title} ${item.isRead ? '✅' : ''}
                        </div>
                        <div class="item-meta">${item.author || 'Yazar Yok'} | ${item.publisher || 'Yayınevi Yok'} | ${item.pages} syf</div>
                    </div>
                    <div class="item-actions">
                        ${!isLibView ? 
                            `<button class="btn ${item.inLibrary ? 'btn-accent' : ''}" onclick="toggleLibrary('${item.id}')">
                                ${item.inLibrary ? '★ Kütüphanemde' : 'Kütüphaneye Ekle'}
                            </button>
                            <button class="btn" style="color:var(--danger); padding:8px;" onclick="deleteItem('${item.id}')">✕</button>`
                            : 
                            `<button class="btn ${item.isRead ? 'btn-accent' : ''}" onclick="toggleRead('${item.id}')">
                                ${item.isRead ? 'Okundu İşaretini Kaldır' : 'Okundu İşaretle'}
                            </button>`
                        }
                    </div>
                </div>`;
            }
        });
        return html;
    }

    function renderArchive() {
        document.getElementById('archiveTree').innerHTML = buildTreeHTML(null, false) || '<p style="color:#666;">Liste boş.</p>';
        document.getElementById('libraryTree').innerHTML = buildTreeHTML(null, true) || '<p style="color:#666;">Kütüphanende henüz kitap yok.</p>';
    }

    // --- İSTATİSTİK MOTORU ---
    function generateStatsHTML(books, isLib) {
        if(books.length === 0) return `<p style="color:#666;">Hesaplanacak veri yok.</p>`;
        
        const totalBooks = books.length;
        const totalPages = books.reduce((sum, b) => sum + (b.pages || 0), 0);
        const avgPages = Math.round(totalPages / totalBooks) || 0;
        
        let longest = books.reduce((max, b) => (b.pages > max.pages ? b : max), books[0]);
        let shortest = books.reduce((min, b) => ((b.pages > 0 && b.pages < min.pages) ? b : min), books[0]);
        
        // En çok kitabı olan yazar hesabı
        let authors = {};
        books.forEach(b => { if(b.author) authors[b.author] = (authors[b.author]||0)+1; });
        let topAuthor = Object.keys(authors).reduce((a, b) => authors[a] > authors[b] ? a : b, "Yok");

        let html = `
            <div class="stat-card"><div class="stat-label">Toplam Kitap</div><div class="stat-val">${totalBooks}</div></div>
            <div class="stat-card"><div class="stat-label">Toplam Sayfa</div><div class="stat-val">${totalPages}</div></div>
            <div class="stat-card"><div class="stat-label">Ort. Sayfa</div><div class="stat-val">${avgPages}</div></div>
            <div class="stat-card"><div class="stat-label">En Çok Yazar</div><div class="stat-val" style="font-size:1.2rem;">${topAuthor}</div></div>
            <div class="stat-card"><div class="stat-label">En Uzun</div><div class="stat-val" style="font-size:1.2rem;">${longest.title}<br><span style="font-size:0.9rem;color:var(--text-muted)">${longest.pages} syf</span></div></div>
        `;

        // Sadece Kütüphane için ek metrikler
        if (isLib) {
            const totalPrice = books.reduce((sum, b) => sum + (b.price || 0), 0);
            const readBooks = books.filter(b => b.isRead);
            const unreadBooks = totalBooks - readBooks.length;
            const readPages = readBooks.reduce((sum, b) => sum + (b.pages || 0), 0);

            html += `
            <div class="stat-card" style="border-top-color: var(--success);"><div class="stat-label">Okunan Kitap</div><div class="stat-val" style="color:var(--success);">${readBooks.length}</div></div>
            <div class="stat-card"><div class="stat-label">Okunan Sayfa</div><div class="stat-val">${readPages}</div></div>
            <div class="stat-card" style="border-top-color: var(--danger);"><div class="stat-label">Okunmayan</div><div class="stat-val" style="color:var(--danger);">${unreadBooks}</div></div>
            <div class="stat-card" style="border-top-color: #ffd700;"><div class="stat-label">Portföy Değeri</div><div class="stat-val" style="color:#ffd700;">${totalPrice} ₺</div></div>
            `;
        }
        return html;
    }

    function renderStats() {
        const allBooks = items.filter(i => i.type === 'book');
        const libBooks = allBooks.filter(i => i.inLibrary);
        
        document.getElementById('statsList').innerHTML = generateStatsHTML(allBooks, false);
        document.getElementById('statsLib').innerHTML = generateStatsHTML(libBooks, true);
    }

    // İlk Yükleme
    renderArchive();
</script>
</body>
</html>
