<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Archive</title>
    <style>
        :root { --bg: #0f0f0f; --text: #f0ede8; --accent: #c9a96e; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        nav { display: flex; gap: 20px; padding: 20px; border-bottom: 1px solid #333; }
        .tab-btn { cursor: pointer; color: #888; border: none; background: none; font-size: 1.1rem; }
        .tab-btn.active { color: var(--accent); font-weight: bold; }
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
    </style>
</head>
<body>

<nav>
    <button class="tab-btn active" onclick="switchTab('listelerim')">Listelerim</button>
    <button class="tab-btn" onclick="switchTab('kutuphanem')">Kütüphanem</button>
    <button class="tab-btn" onclick="switchTab('verilerim')">Verilerim</button>
</nav>

<div id="listelerim" class="view active"><h1>Listelerim</h1><p>Klasörler ve arama burada olacak.</p></div>
<div id="kutuphanem" class="view"><h1>Kütüphanem</h1><p>Aynalanan kitaplar burada olacak.</p></div>
<div id="verilerim" class="view"><h1>Verilerim</h1><p>İstatistikler burada olacak.</p></div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }
</script>
</body>
</html>
